name: build-bazzite-image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 pinned (Forgejo provenance/SLSA)
      - name: Build (BlueBuild) and push to Forgejo registry
        # Pinned pre-provenance-verification commit to avoid data.forgejo.org action resolution failures.
        uses: https://github.com/blue-build/github-action@c1c1e56702055fb24f60660162e670203f977195
        with:
          skip_checkout: "true"
          recipe: recipe.yml
          pr_event_number: 0
          cli_version: v0.9
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry: forgejo.mailstation.de
          registry_namespace: ${{ secrets.FORGEJO_REGISTRY_USER }}
          registry_username: ${{ secrets.FORGEJO_REGISTRY_USER }}
          registry_token: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}
          squash: "true"
          maximize_build_space: "false"
