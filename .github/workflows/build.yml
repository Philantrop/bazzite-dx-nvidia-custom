name: bluebuild

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 4 * * 1" # weekly Monday 04:00 UTC
  workflow_dispatch:

jobs:
  bluebuild:
    name: Build + Sign Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Get upstream digest (Bazzite stable)
        id: upstream
        run: |
          set -euo pipefail
          DIGEST="$(skopeo inspect --format '{{.Digest}}' docker://ghcr.io/ublue-os/bazzite-dx-nvidia:stable)"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Upstream digest: $DIGEST"

      - name: Restore upstream digest cache gate
        id: digestcache
        uses: actions/cache/restore@v4
        with:
          path: .upstream-digest-cache
          key: upstream-bazzite-dx-nvidia-stable-${{ steps.upstream.outputs.digest }}

      - name: Decide whether to skip scheduled build
        id: gate
        run: |
          set -euo pipefail
          mkdir -p .upstream-digest-cache

          SKIP="false"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ steps.digestcache.outputs.cache-hit }}" = "true" ]; then
            SKIP="true"
          fi

          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "skip=$SKIP"

      - name: Write upstream digest cache marker
        if: steps.gate.outputs.skip != 'true' && steps.digestcache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p .upstream-digest-cache
          echo "${{ steps.upstream.outputs.digest }}" > .upstream-digest-cache/digest.txt

      - name: Build Custom Image (signed)
        if: steps.gate.outputs.skip != 'true'
        uses: blue-build/github-action@v1
        env:
          COSIGN_PASSWORD: ""
        with:
          recipe: recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          # Only PR events have a PR number; default to 0 otherwise.
          pr_event_number: ${{ github.event.pull_request.number || 0 }}
          rechunk: "false"

      - name: Mirror built image to Forgejo registry (backup)
        if: ${{ steps.gate.outputs.skip != 'true' && secrets.FORGEJO_REGISTRY_TOKEN != '' && secrets.FORGEJO_REGISTRY_USER != '' }}
        env:
          FORGEJO_REGISTRY: forgejo.mailstation.de
          FORGEJO_REGISTRY_USER: ${{ secrets.FORGEJO_REGISTRY_USER }}
          FORGEJO_REGISTRY_TOKEN: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          command -v cosign >/dev/null 2>&1 || { echo 'cosign not found (expected after blue-build step)'; exit 1; }

          RECIPE_PATH="recipes/recipe.yml"
          IMAGE_NAME="$(awk -F': ' '/^name:/ {print $2; exit}' "${RECIPE_PATH}")"
          if [ -z "${IMAGE_NAME}" ]; then
            echo "Could not parse image name from ${RECIPE_PATH}" >&2
            exit 1
          fi

          GHCR_NS="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          SRC_IMAGE="ghcr.io/${GHCR_NS}/${IMAGE_NAME}:stable"
          DST_IMAGE="${FORGEJO_REGISTRY}/${FORGEJO_REGISTRY_USER}/${IMAGE_NAME}:stable"

          echo "Mirroring (including cosign signatures/attestations):"
          echo "  ${SRC_IMAGE} -> ${DST_IMAGE}"

          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          echo "${FORGEJO_REGISTRY_TOKEN}" | docker login "${FORGEJO_REGISTRY}" -u "${FORGEJO_REGISTRY_USER}" --password-stdin

          cosign copy "${SRC_IMAGE}" "${DST_IMAGE}"

      - name: Save upstream digest cache gate
        if: steps.gate.outputs.skip != 'true' && steps.digestcache.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: .upstream-digest-cache
          key: upstream-bazzite-dx-nvidia-stable-${{ steps.upstream.outputs.digest }}
